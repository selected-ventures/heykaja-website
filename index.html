<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaja — Die erste KI, die eure Beziehung versteht</title>
    <meta name="description" content="Kaja erkennt, warum eure Konflikte immer nach dem gleichen Muster ablaufen — und zeigt dir, wie du das Muster noch heute durchbrichst.">
    <meta property="og:title" content="Kaja — Die erste KI, die eure Beziehung versteht">
    <meta property="og:description" content="Kaja erkennt, warum eure Konflikte immer nach dem gleichen Muster ablaufen — und zeigt dir, wie du das Muster noch heute durchbrichst.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://heykaja.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #A26452;
            --primary-dark: #894B34;
            --cream: #F9F6F1;
            --sand: #D9C5B2;
            --sage: #6b7f5e;
            --text: #2C2C2C;
            --text-light: #5C5C5C;
            --serif: 'Noto Serif', Georgia, serif;
            --sans: 'Manrope', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; scroll-behavior: smooth; }

        body {
            font-family: var(--sans);
            background: var(--cream);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        /* ==================== NAV ==================== */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0; z-index: 100;
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(249, 246, 241, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: box-shadow 0.3s ease;
        }

        nav.scrolled {
            box-shadow: 0 1px 0 rgba(162, 100, 82, 0.1);
        }

        /* ==================== WORDMARK ==================== */
        .wordmark {
            font-family: var(--serif);
            font-size: 1.55rem;
            font-weight: 500;
            font-style: italic;
            color: var(--text);
            letter-spacing: -0.01em;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .wordmark-ring {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1.8px solid var(--primary);
            flex-shrink: 0;
            margin-right: -0.15rem;
            position: relative;
            top: 1px;
        }

        .nav-cta {
            font-family: var(--sans);
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: 0.03em;
            padding: 0.5rem 1.25rem;
            border: 1.5px solid var(--primary);
            border-radius: 100px;
            transition: all 0.25s ease;
        }

        .nav-cta:hover {
            background: var(--primary);
            color: var(--cream);
        }

        /* ==================== HERO ==================== */
        .hero {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 8rem 2rem 4rem;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 80%, rgba(162, 100, 82, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 80% 20%, rgba(217, 197, 178, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            max-width: 740px;
        }

        .hero h1 {
            font-family: var(--serif);
            font-size: clamp(2rem, 5.5vw, 3.2rem);
            font-weight: 500;
            line-height: 1.3;
            color: var(--text);
            margin-bottom: 1.75rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.2s forwards;
        }

        .hero-sub {
            font-family: var(--sans);
            font-size: clamp(1rem, 2.5vw, 1.15rem);
            font-weight: 400;
            line-height: 1.65;
            color: var(--text-light);
            max-width: 560px;
            margin: 0 auto 2.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.4s forwards;
        }

        /* ==================== TYPEWRITER ==================== */
        .typewriter-slot {
            display: inline;
            color: var(--primary);
        }

        .typewriter-cursor {
            display: inline-block;
            width: 2.5px;
            height: 0.8em;
            background: var(--primary);
            margin-left: 2px;
            vertical-align: baseline;
            position: relative;
            top: 0.1em;
            animation: blink 0.65s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ==================== CTA ==================== */
        .cta-wrapper {
            opacity: 0;
            animation: fadeUp 0.8s ease 0.6s forwards;
        }

        .app-store-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.9rem 2rem;
            background: var(--text);
            color: white;
            border-radius: 12px;
            text-decoration: none;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            font-family: var(--sans);
        }

        .app-store-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(44, 44, 44, 0.15);
        }

        .app-store-btn:active { transform: translateY(0); }
        .app-store-btn .apple-icon { width: 22px; height: 22px; }

        .app-store-btn .btn-text {
            display: flex; flex-direction: column;
            align-items: flex-start; line-height: 1.2;
        }

        .app-store-btn .btn-text .small {
            font-size: 0.65rem; font-weight: 400;
            letter-spacing: 0.02em; opacity: 0.85;
        }

        .app-store-btn .btn-text .large {
            font-size: 1.1rem; font-weight: 600; letter-spacing: -0.01em;
        }

        /* ==================== FOOTER ==================== */
        footer {
            padding: 3rem 2rem;
            text-align: center;
            background: var(--cream);
            border-top: 1px solid rgba(162, 100, 82, 0.08);
        }

        .footer-links {
            display: flex; justify-content: center;
            gap: 1.5rem; flex-wrap: wrap; margin-bottom: 1.25rem;
        }

        .footer-links a {
            font-family: var(--sans); font-size: 0.8rem; font-weight: 400;
            color: var(--text-light); text-decoration: none;
            letter-spacing: 0.02em; transition: color 0.2s ease;
        }

        .footer-links a:hover { color: var(--primary); }

        .footer-meta {
            font-family: var(--sans); font-size: 0.75rem;
            color: var(--sand); letter-spacing: 0.02em;
        }

        .footer-meta a {
            color: var(--sand); text-decoration: none; transition: color 0.2s ease;
        }

        .footer-meta a:hover { color: var(--primary); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            nav { padding: 1rem 1.25rem; }
            .wordmark { font-size: 1.35rem; }
            .wordmark-ring { width: 14px; height: 14px; }
            .hero { padding: 7rem 1.5rem 3rem; }
            .hero-sub { font-size: 1rem; }
            .footer-links { gap: 1rem; }
        }
    </style>
</head>
<body>

    <nav id="nav">
        <a href="/" class="wordmark"><span class="wordmark-ring"></span>Kaja</a>
        <a href="#PLACEHOLDER_APP_STORE_URL" class="nav-cta">App laden</a>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>
                Die erste KI, die eure<br>
                <span class="typewriter-slot" id="typewriterSlot">Beziehung</span><span class="typewriter-cursor"></span> versteht.
            </h1>

            <p class="hero-sub">
                Kaja erkennt, warum eure Konflikte immer nach dem gleichen Muster ablaufen — und zeigt dir, wie du das Muster noch heute durchbrichst.
            </p>

            <div class="cta-wrapper">
                <a href="#PLACEHOLDER_APP_STORE_URL" class="app-store-btn" aria-label="Im App Store laden">
                    <svg class="apple-icon" viewBox="0 0 22 22" fill="white" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.32 2.32-2.14 4.45-3.74 4.25z"/>
                    </svg>
                    <span class="btn-text">
                        <span class="small">Laden im</span>
                        <span class="large">App Store</span>
                    </span>
                </a>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-links">
            <a href="/privacy.html">Datenschutz</a>
            <a href="/terms.html">Nutzungsbedingungen</a>
            <a href="/imprint.html">Impressum</a>
        </div>
        <p class="footer-meta">
            © 2026 · <a href="mailto:hello@heykaja.com">hello@heykaja.com</a>
        </p>
    </footer>

    <script>
        const nav = document.getElementById('nav');
        window.addEventListener('scroll', () => {
            nav.classList.toggle('scrolled', window.scrollY > 10);
        });

        const slot = document.getElementById('typewriterSlot');
        const words = ['Beziehung', 'Konflikte', 'Muster', 'Kommunikation'];
        let wordIdx = 0;
        let charIdx = words[0].length;
        let deleting = true;

        function step() {
            const word = words[wordIdx];

            if (deleting) {
                charIdx--;
                slot.textContent = word.substring(0, charIdx);
                if (charIdx === 0) {
                    deleting = false;
                    wordIdx = (wordIdx + 1) % words.length;
                    setTimeout(step, 350);
                    return;
                }
                setTimeout(step, 45 + Math.random() * 25);
            } else {
                const next = words[wordIdx];
                charIdx++;
                slot.textContent = next.substring(0, charIdx);
                if (charIdx === next.length) {
                    deleting = true;
                    setTimeout(step, 2400);
                    return;
                }
                setTimeout(step, 65 + Math.random() * 35);
            }
        }

        setTimeout(step, 2800);
    </script>

</body>
</html>
